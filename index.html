<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTZ Servicio Técnico – Catálogo</title>
<link rel="icon" href="favicon.png" type="image/png">
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --teal:#2DD4BF;--teal-dark:#0F9583;--teal-glow:rgba(45,212,191,0.13);
  --bg:#0a0a0a;--surface:#111;--surface2:#1a1a1a;
  --border:rgba(45,212,191,0.2);--border2:rgba(255,255,255,0.08);
  --text:#f0f0f0;--muted:#777;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}

/* HEADER */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;gap:1.5rem;height:72px;position:sticky;top:0;z-index:100}
.logo-wrap{display:flex;align-items:center;gap:1rem;flex-shrink:0}
.logo-img{height:48px;max-width:160px;object-fit:contain;display:none}
.logo-icon{width:44px;height:44px;border:2px solid var(--teal);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.1rem;color:var(--teal);letter-spacing:1px;flex-shrink:0}
.logo-text{display:flex;flex-direction:column;line-height:1.1}
.logo-text span:first-child{font-family:'Rajdhani',sans-serif;font-size:1.3rem;font-weight:700;color:#fff;letter-spacing:2px}
.logo-text span:last-child{font-size:.65rem;color:var(--teal);letter-spacing:3px;text-transform:uppercase}
.header-search{flex:1;max-width:480px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.5rem 1rem;color:var(--text);font-size:.9rem;outline:none;transition:border-color .2s;font-family:'Inter',sans-serif}
.header-search:focus{border-color:var(--teal)}
.header-search::placeholder{color:var(--muted)}
.header-right{display:flex;align-items:center;gap:1rem;margin-left:auto}
.stats-chip{background:var(--teal-glow);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:.8rem;color:var(--teal);white-space:nowrap}

/* CART BUTTON */
.cart-btn{position:relative;background:var(--teal-glow);border:1px solid var(--border);color:var(--teal);width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;cursor:pointer;transition:all .2s;flex-shrink:0}
.cart-btn:hover{background:var(--teal);color:#000}
.cart-count{position:absolute;top:-6px;right:-6px;background:var(--teal);color:#000;font-size:.65rem;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
.cart-count.visible{opacity:1}

/* CONTACT BAR */
.contact-bar{background:#0d1f1d;border-bottom:1px solid var(--border);padding:.5rem 2rem;display:flex;align-items:center;gap:1.5rem;font-size:.82rem;color:var(--teal);flex-wrap:wrap}
.contact-bar a,.contact-bar span{display:flex;align-items:center;gap:.4rem;text-decoration:none;color:var(--teal);transition:opacity .2s}
.contact-bar a:hover{opacity:.7}

/* FILTERS */
.filters-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:.75rem 2rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.filter-label{font-size:.8rem;color:var(--muted);margin-right:4px}
.filter-btn{background:var(--surface2);border:1px solid var(--border2);color:var(--muted);padding:5px 14px;border-radius:20px;font-size:.8rem;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.filter-btn:hover{border-color:var(--teal);color:var(--teal)}
.filter-btn.active{background:var(--teal-glow);border-color:var(--teal);color:var(--teal)}
.sort-select{margin-left:auto;background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:5px 12px;border-radius:8px;font-size:.8rem;cursor:pointer;outline:none;font-family:'Inter',sans-serif}

/* MAIN */
main{padding:1.5rem 2rem;max-width:1400px;margin:0 auto}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem}

/* PRODUCT CARD */
.product-card{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:1rem;transition:border-color .2s,transform .2s;display:flex;flex-direction:column;gap:.5rem;position:relative}
.product-card:hover{border-color:var(--border);transform:translateY(-2px)}
.product-img{width:100%;aspect-ratio:1;background:var(--surface2);border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden;border:1px solid var(--border2);margin-bottom:4px}
.product-img img{width:100%;height:100%;object-fit:contain}
.no-img-icon{font-size:2rem;color:rgba(255,255,255,.1)}
.product-code{font-size:.7rem;color:var(--teal);font-family:'Rajdhani',sans-serif;letter-spacing:1px}
.product-name{font-size:.88rem;font-weight:500;line-height:1.3;flex:1}
.product-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto;gap:.5rem}
.product-price{font-family:'Rajdhani',sans-serif;font-size:1.05rem;font-weight:700;color:#fff}
.product-price.consultar{font-size:.78rem;color:var(--muted);font-family:'Inter',sans-serif;font-weight:400}
.product-stock{font-size:.72rem;padding:3px 8px;border-radius:20px;white-space:nowrap}
.stock-ok{background:rgba(34,197,94,.12);color:#4ade80}
.stock-zero{background:rgba(239,68,68,.1);color:#f87171}

/* ADD TO CART BUTTON on card */
.btn-add-cart{width:100%;margin-top:.5rem;background:transparent;border:1px solid var(--border);color:var(--muted);padding:7px;border-radius:8px;font-size:.8rem;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.4rem}
.btn-add-cart:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-glow)}
.btn-add-cart.in-cart{border-color:rgba(34,197,94,.4);color:#4ade80;background:rgba(34,197,94,.08)}
.btn-add-cart.in-cart:hover{border-color:#f87171;color:#f87171;background:rgba(239,68,68,.08)}

/* STATES */
.state-center{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 2rem;gap:1rem;color:var(--muted)}
.state-center .big-icon{font-size:3rem;opacity:.3}
.state-center h3{font-size:1.1rem;color:var(--text);font-weight:500}
.state-center p{font-size:.9rem;text-align:center;max-width:400px}

/* PAGINATION */
.pagination{display:flex;align-items:center;justify-content:center;gap:.5rem;padding:2rem 0 1rem}
.page-btn{background:var(--surface);border:1px solid var(--border2);color:var(--muted);width:36px;height:36px;border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;font-size:.85rem;transition:all .2s}
.page-btn:hover:not(:disabled){border-color:var(--teal);color:var(--teal)}
.page-btn.active{background:var(--teal-glow);border-color:var(--teal);color:var(--teal)}
.page-btn:disabled{opacity:.3;cursor:default}
.page-info{font-size:.8rem;color:var(--muted);padding:0 .5rem}

/* ── CART DRAWER ──────────────────────────────────────── */
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(3px)}
.cart-overlay.open{opacity:1;pointer-events:all}
.cart-drawer{position:fixed;top:0;right:0;bottom:0;width:380px;max-width:100vw;background:var(--surface);border-left:1px solid var(--border);z-index:201;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.cart-drawer.open{transform:translateX(0)}
.cart-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.cart-header h2{font-family:'Rajdhani',sans-serif;font-size:1.3rem;letter-spacing:1px;color:var(--teal)}
.cart-close{background:none;border:none;color:var(--muted);font-size:1.4rem;cursor:pointer;line-height:1;padding:4px}
.cart-close:hover{color:var(--text)}
.cart-body{flex:1;overflow-y:auto;padding:1rem 1.5rem}
.cart-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:.75rem;color:var(--muted)}
.cart-empty .icon{font-size:3rem;opacity:.25}
.cart-empty p{font-size:.9rem}
.cart-item{display:flex;align-items:flex-start;gap:.75rem;padding:.85rem 0;border-bottom:1px solid var(--border2)}
.cart-item:last-child{border-bottom:none}
.cart-item-img{width:52px;height:52px;border-radius:8px;background:var(--surface2);border:1px solid var(--border2);object-fit:contain;flex-shrink:0}
.cart-item-img-placeholder{width:52px;height:52px;border-radius:8px;background:var(--surface2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.cart-item-info{flex:1;min-width:0}
.cart-item-code{font-size:.68rem;color:var(--teal);font-family:'Rajdhani',sans-serif;letter-spacing:1px}
.cart-item-name{font-size:.83rem;font-weight:500;line-height:1.3;margin:.1rem 0 .3rem}
.cart-item-price{font-family:'Rajdhani',sans-serif;font-size:.95rem;font-weight:700;color:#fff}
.cart-item-price.consultar{font-size:.75rem;color:var(--muted);font-family:'Inter',sans-serif;font-weight:400}
.cart-item-qty{display:flex;align-items:center;gap:.4rem;margin-top:.4rem}
.qty-btn{background:var(--surface2);border:1px solid var(--border2);color:var(--text);width:26px;height:26px;border-radius:6px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s;line-height:1}
.qty-btn:hover{border-color:var(--teal);color:var(--teal)}
.qty-num{font-family:'Rajdhani',sans-serif;font-size:.95rem;font-weight:700;min-width:20px;text-align:center}
.cart-item-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.95rem;padding:4px;line-height:1;margin-left:auto;align-self:flex-start;flex-shrink:0;transition:color .2s}
.cart-item-remove:hover{color:#f87171}
.cart-footer{padding:1.25rem 1.5rem;border-top:1px solid var(--border2);flex-shrink:0;display:flex;flex-direction:column;gap:.75rem}
.cart-summary{font-size:.82rem;color:var(--muted);display:flex;justify-content:space-between}
.cart-summary strong{color:var(--text)}
.cart-note{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:.6rem .85rem;color:var(--text);font-size:.83rem;font-family:'Inter',sans-serif;outline:none;resize:vertical;min-height:60px;transition:border-color .2s}
.cart-note:focus{border-color:var(--teal)}
.cart-note::placeholder{color:var(--muted)}
.btn-wa{width:100%;background:#25D366;border:none;color:#fff;padding:13px;border-radius:10px;font-size:.95rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:opacity .2s;display:flex;align-items:center;justify-content:center;gap:.5rem}
.btn-wa:hover{opacity:.9}
.btn-clear-cart{width:100%;background:none;border:1px solid var(--border2);color:var(--muted);padding:8px;border-radius:8px;font-size:.8rem;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.btn-clear-cart:hover{border-color:#f87171;color:#f87171}

/* WA FAB */
.wa-fab{position:fixed;bottom:1.5rem;right:1.5rem;background:#25D366;width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;text-decoration:none;box-shadow:0 4px 16px rgba(37,211,102,.4);z-index:99;transition:transform .2s;border:none;cursor:pointer}
.wa-fab:hover{transform:scale(1.1)}

/* STORE SELECTOR */
.store-selector{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:.45rem .85rem;margin-bottom:.5rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.store-selector-label{font-size:.7rem;color:var(--muted);white-space:nowrap;flex-shrink:0}
.store-options{display:flex;gap:.6rem;flex-wrap:wrap}
.store-option{display:flex;align-items:center;gap:.35rem;cursor:pointer;padding:.15rem 0}
.store-option input[type=radio]{accent-color:var(--teal);width:13px;height:13px;cursor:pointer;flex-shrink:0}
.store-option-text{font-size:.75rem;line-height:1.2}
.store-option-text strong{color:var(--text);font-weight:500}
.store-option-text span{display:none}

/* FAB STORE MODAL */
.fab-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:150;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(4px)}
.fab-modal-overlay.open{opacity:1;pointer-events:all}
.fab-modal{position:fixed;bottom:5.5rem;right:1.5rem;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.25rem;width:260px;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:151;transform:translateY(10px) scale(.97);opacity:0;transition:all .25s;pointer-events:none}
.fab-modal-overlay.open .fab-modal{transform:translateY(0) scale(1);opacity:1;pointer-events:all}
.fab-modal h4{font-family:'Rajdhani',sans-serif;font-size:1rem;color:var(--teal);margin-bottom:.9rem;letter-spacing:.5px}
.fab-wa-btn{display:flex;align-items:center;gap:.75rem;background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.3);border-radius:10px;padding:.75rem 1rem;color:#fff;cursor:pointer;font-size:.85rem;font-family:'Inter',sans-serif;width:100%;margin-bottom:.5rem;transition:all .2s}
.fab-wa-btn:hover{background:rgba(37,211,102,.2);border-color:rgba(37,211,102,.6)}
.fab-wa-btn:last-child{margin-bottom:0}
.fab-wa-icon{width:28px;height:28px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fab-wa-info strong{display:block;font-weight:600}
.fab-wa-info span{font-size:.72rem;color:rgba(255,255,255,.6)}

/* IMG MODAL (FULLSCREEN) */
.pub-img-modal{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:none;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;backdrop-filter:blur(3px)}
.pub-img-modal.open{display:flex;opacity:1}
.pub-img-close{position:absolute;top:1.5rem;right:1.5rem;background:none;border:none;color:#fff;font-size:2rem;cursor:pointer;line-height:1;z-index:10000;opacity:.7;transition:opacity .2s}
.pub-img-close:hover{opacity:1}
.pub-img-content{max-width:95vw;max-height:90vh;object-fit:contain;border-radius:8px;transform:scale(.95);transition:transform .2s;user-select:none;cursor:zoom-out}
.pub-img-modal.open .pub-img-content{transform:scale(1)}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem}
.spinner{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay p{color:var(--teal);font-size:.9rem}
.loading-overlay.hidden{display:none}

/* CART BOUNCE ANIM */
@keyframes cartBounce{0%{transform:scale(1)}40%{transform:scale(1.3)}70%{transform:scale(.9)}100%{transform:scale(1)}}
.bounce{animation:cartBounce .35s ease}

/* CAROUSEL */
.carousel-wrap{position:relative;width:100%;overflow:hidden;background:var(--surface);border-bottom:1px solid var(--border2);display:none}
.carousel-wrap.ready{display:block}
.carousel-track{display:flex;transition:transform .5s cubic-bezier(.4,0,.2,1);will-change:transform}
.carousel-slide{min-width:100%;position:relative;overflow:hidden;cursor:pointer}
.carousel-slide img{width:100%;aspect-ratio:3/1;min-height:140px;object-fit:cover;display:block}
.carousel-caption{position:absolute;bottom:0;left:0;right:0;padding:1.25rem 2rem;background:linear-gradient(transparent,rgba(0,0,0,.65));pointer-events:none}
.carousel-caption h3{font-family:'Rajdhani',sans-serif;font-size:clamp(1rem,3vw,1.6rem);font-weight:700;color:#fff;letter-spacing:1px;text-shadow:0 1px 4px rgba(0,0,0,.5)}
.carousel-caption p{font-size:clamp(.72rem,1.5vw,.92rem);color:rgba(255,255,255,.8);margin-top:.25rem;text-shadow:0 1px 3px rgba(0,0,0,.5)}
.carousel-prev,.carousel-next{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.15);color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:background .2s;z-index:2;line-height:1}
.carousel-prev{left:1rem}
.carousel-next{right:1rem}
.carousel-prev:hover,.carousel-next:hover{background:rgba(45,212,191,.5)}
.carousel-dots{position:absolute;bottom:.6rem;left:50%;transform:translateX(-50%);display:flex;gap:.4rem;z-index:2}
.carousel-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.4);border:none;cursor:pointer;padding:0;transition:all .25s}
.carousel-dot.active{background:var(--teal);transform:scale(1.25)}
@media(max-width:600px){
  .carousel-prev,.carousel-next{width:28px;height:28px;font-size:.85rem}
  .carousel-caption{padding:.75rem 1rem}
}

@media(max-width:600px){
  header{padding:0 1rem;gap:.75rem}
  .header-search{max-width:160px}
  .stats-chip{display:none}
  .contact-bar{display:none}
  .filters-bar{padding:.75rem 1rem}
  main{padding:1rem}
  .product-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.75rem}
  .cart-drawer{width:100vw}
}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <p>Cargando catálogo...</p>
</div>

<header>
  <div class="logo-wrap">
    <img class="logo-img" id="logoImg" alt="DTZ Servicio Técnico">
    <div class="logo-icon" id="logoIcon">DTZ</div>
    <div class="logo-text" id="logoText">
      <span>DTZ</span>
      <span>Servicio Técnico</span>
    </div>
  </div>
  <input class="header-search" type="text" id="searchInput" placeholder="🔍  Buscar producto o código...">
  <div class="header-right">
    <div class="stats-chip" id="statsChip">Cargando...</div>
    <button class="cart-btn" id="cartBtn" onclick="toggleCart()" title="Ver carrito">
      🛒
      <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
</header>

<div class="contact-bar" id="contactBar"></div>

<div class="filters-bar">
  <span class="filter-label">Stock:</span>
  <button class="filter-btn active" onclick="setFilter('all',this)">Todos</button>
  <button class="filter-btn" onclick="setFilter('stock',this)">Con stock</button>
  <button class="filter-btn" onclick="setFilter('nostock',this)">Sin stock</button>
  <span class="filter-label" style="margin-left:1rem">Precio:</span>
  <button class="filter-btn" onclick="setFilter('precio',this)">Con precio</button>
  <button class="filter-btn" onclick="setFilter('consultar',this)">Consultar</button>
  <select class="sort-select" id="sortSelect" onchange="applyFiltersAndRender()">
    <option value="code">Ordenar: Código</option>
    <option value="name">Ordenar: Nombre A-Z</option>
    <option value="price_asc">Precio: menor a mayor</option>
    <option value="price_desc">Precio: mayor a menor</option>
  </select>
</div>

<!-- CAROUSEL -->
<div class="carousel-wrap" id="carouselWrap">
  <div class="carousel-track" id="carouselTrack"></div>
  <button class="carousel-prev" id="carouselPrev" onclick="carouselMove(-1)">&#8249;</button>
  <button class="carousel-next" id="carouselNext" onclick="carouselMove(1)">&#8250;</button>
  <div class="carousel-dots" id="carouselDots"></div>
</div>

<main>
  <div class="product-grid" id="productGrid"></div>
  <div class="pagination" id="pagination" style="display:none"></div>
</main>

<!-- CART DRAWER -->
<div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-header">
    <h2>🛒 MI PEDIDO</h2>
    <button class="cart-close" onclick="toggleCart()">✕</button>
  </div>
  <div class="cart-body" id="cartBody"></div>
  <div class="cart-footer" id="cartFooter" style="display:none">
    <div class="cart-summary">
      <span><strong id="cartItemCount">0</strong> productos</span>
      <span id="cartTotalWrap">Total: <strong id="cartTotal">–</strong></span>
    </div>
    <!-- Selección de local -->
    <div class="store-selector">
      <span class="store-selector-label">📍 Retiro en</span>
      <div class="store-options">
        <label class="store-option">
          <input type="radio" name="storeSelect" id="store1" value="store1" checked>
          <div class="store-option-text">
            <strong>San Juan 2984</strong>
            <span>+54 9 3416 60-8662</span>
          </div>
        </label>
        <label class="store-option">
          <input type="radio" name="storeSelect" id="store2" value="store2">
          <div class="store-option-text">
            <strong>San Juan 1912</strong>
            <span>+54 9 341 328-1697</span>
          </div>
        </label>

<script>
const PER_PAGE = 25;
let allProducts = [], filtered = [], currentFilter = 'all', currentPage = 1;
let allOverrides = {}, activePromotions = [];
let carouselIndex = 0, carouselTimer = null, carouselSlides = [];
let cart = {};

const WA_STORES = {
  store1: { nombre: 'San Juan 2984', numero: '5493416608662' },
  store2: { nombre: 'San Juan 1912', numero: '5493413281697' }
};

const db = window.supabase.createClient(DTZ_CONFIG.supabaseUrl, DTZ_CONFIG.supabaseAnonKey);

// ── CART PERSISTENCE (localStorage) ──────────────────────
const CART_KEY   = 'dtz_cart_v1';
const CART_TTL_H = 24; // horas
function saveCartToStorage() {
  try {
    localStorage.setItem(CART_KEY, JSON.stringify({
      cart,
      savedAt: Date.now()
    }));
  } catch(e) {}
}
function loadCartFromStorage() {
  try {
    const raw = localStorage.getItem(CART_KEY);
    if (!raw) return;
    const { cart: saved, savedAt } = JSON.parse(raw);
    const hoursElapsed = (Date.now() - savedAt) / 3600000;
    if (hoursElapsed > CART_TTL_H) { localStorage.removeItem(CART_KEY); return; }
    // Reconstruir solo con productos que existen en allProducts
    Object.values(saved).forEach(({ product: p, qty }) => {
      const fresh = allProducts.find(x => x.id === p.id);
      if (fresh) cart[fresh.id] = { product: fresh, qty };
    });
    if (Object.keys(cart).length) {
      updateCartCount();
      renderCartDrawer();
    }
  } catch(e) {}
}
function clearCartStorage() {
  try { localStorage.removeItem(CART_KEY); } catch(e) {}
}

// ── LOGO ──────────────────────────────────────────────────
async function loadLogo() {
  const cached = localStorage.getItem('dtz_logo_url');
  const applyLogo = (url) => {
    const img = document.getElementById('logoImg');
    img.src = url; img.style.display = 'block';
    document.getElementById('logoIcon').style.display = 'none';
    document.getElementById('logoText').style.display = 'none';
  };
  if (cached) applyLogo(cached);

  try {
    const {data} = await db.from('configuracion').select('valor').eq('clave','logo_url').single();
    if (data?.valor) {
      localStorage.setItem('dtz_logo_url', data.valor);
      if (data.valor !== cached) applyLogo(data.valor);
    }
  } catch(e) {}
}

// ── CAROUSEL ─────────────────────────────────────────
async function loadBanners() {
  try {
    const {data} = await db.from('banners').select('*').eq('activo',true).order('orden',{ascending:true});
    carouselSlides = data||[];
    if (!carouselSlides.length) return;
    const track = document.getElementById('carouselTrack');
    const dots  = document.getElementById('carouselDots');
    track.innerHTML = carouselSlides.map((b,i) => `
      <div class="carousel-slide" onclick="${b.link_url?`window.open('${b.link_url}','_blank')`:''}">
        <img src="${esc(b.img_url)}" alt="${esc(b.titulo||'Banner')}" loading="${i===0?'eager':'lazy'}">
        ${(b.titulo||b.subtitulo)?`
        <div class="carousel-caption">
          ${b.titulo?`<h3>${esc(b.titulo)}</h3>`:''}
          ${b.subtitulo?`<p>${esc(b.subtitulo)}</p>`:''}
        </div>`:''}
      </div>`).join('');
    dots.innerHTML = carouselSlides.map((_,i) =>
      `<button class="carousel-dot ${i===0?'active':''}" onclick="carouselGoTo(${i})" aria-label="Slide ${i+1}"></button>`
    ).join('');
    document.getElementById('carouselWrap').classList.add('ready');
    if (carouselSlides.length > 1) carouselStart();
  } catch(e) {}
}
function carouselMove(dir) {
  carouselGoTo((carouselIndex + dir + carouselSlides.length) % carouselSlides.length);
}
function carouselGoTo(idx) {
  carouselIndex = idx;
  document.getElementById('carouselTrack').style.transform = `translateX(-${idx*100}%)`;
  document.querySelectorAll('.carousel-dot').forEach((d,i) => d.classList.toggle('active', i===idx));
  carouselRestart();
}
function carouselStart() {
  carouselTimer = setInterval(() => carouselMove(1), 5000);
}
function carouselRestart() {
  clearInterval(carouselTimer);
  if (carouselSlides.length > 1) carouselStart();
}
const _cw = document.getElementById('carouselWrap');
_cw.addEventListener('mouseenter', () => clearInterval(carouselTimer));
_cw.addEventListener('mouseleave', () => { if(carouselSlides.length>1) carouselStart(); });
// Touch / swipe
let _tsX = null;
_cw.addEventListener('touchstart', e => { _tsX = e.touches[0].clientX; }, {passive:true});
_cw.addEventListener('touchend',   e => {
  if (_tsX === null) return;
  const dx = e.changedTouches[0].clientX - _tsX;
  if (Math.abs(dx) > 40) carouselMove(dx < 0 ? 1 : -1);
  _tsX = null;
});

// ── PRODUCTS ──────────────────────────────────────────────
async function loadProducts() {
  // document.getElementById('loadingOverlay').classList.remove('hidden');
  try {
    // Productos
    let allData=[], from=0, pageSize=1000, keepGoing=true;
    while(keepGoing){
      const {data,error}=await db.from('productos')
        .select('id,code,name,price,stock,img_url,has_valid_code')
        .order('code_num',{ascending:true})
        .range(from, from+pageSize-1);
      if(error) throw error;
      allData=allData.concat(data||[]);
      keepGoing=(data&&data.length===pageSize);
      from+=pageSize;
    }
    allProducts=allData;
    // Overrides (nombre/precio personalizado)
    const {data:ovData} = await db.from('product_overrides').select('code,display_name,custom_price');
    allOverrides={};
    (ovData||[]).forEach(o=>{ allOverrides[o.code]=o; });
    // Promociones activas
    const {data:promoData} = await db.from('promotions').select('*').eq('activo',true).order('min_cantidad',{ascending:true});
    activePromotions = promoData||[];
  } catch(e) { allProducts=[]; }
  document.getElementById('loadingOverlay').classList.add('hidden');
  applyFiltersAndRender();
}

function setFilter(f, btn) {
  currentFilter = f; currentPage = 1;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFiltersAndRender();
}

function applyFiltersAndRender() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const sort = document.getElementById('sortSelect').value;
  filtered = allProducts.filter(p => {
    if (q && !p.name.toLowerCase().includes(q) && !String(p.code).toLowerCase().includes(q)) return false;
    if (currentFilter==='stock') return p.stock>0;
    if (currentFilter==='nostock') return p.stock===0;
    if (currentFilter==='precio') return p.price>0;
    if (currentFilter==='consultar') return p.price===0;
    return true;
  });
  filtered.sort((a,b)=>{
    if (sort==='name') return a.name.localeCompare(b.name);
    if (sort==='price_asc') return a.price-b.price;
    if (sort==='price_desc') return b.price-a.price;
    return (parseInt(String(a.code).replace('*',''))||9999)-(parseInt(String(b.code).replace('*',''))||9999);
  });
  document.getElementById('statsChip').textContent=`${filtered.length} de ${allProducts.length} productos`;
  renderPage(1);
}

function renderPage(page) {
  currentPage = page;
  const slice = filtered.slice((page-1)*PER_PAGE, page*PER_PAGE);
  const grid = document.getElementById('productGrid');
  if (!allProducts.length) {
    grid.innerHTML=`<div class="state-center"><div class="big-icon">📦</div><h3>Catálogo no disponible</h3><p>Contactanos por WhatsApp para consultar disponibilidad.</p></div>`;
    document.getElementById('pagination').style.display='none'; return;
  }
  if (!filtered.length) {
    grid.innerHTML=`<div class="state-center"><div class="big-icon">🔍</div><h3>Sin resultados</h3><p>Probá con otro término o quitá los filtros activos.</p></div>`;
    document.getElementById('pagination').style.display='none'; return;
  }
  grid.innerHTML = slice.map(p => {
    const ov = allOverrides[p.code];
    const displayName  = ov?.display_name  || p.name;
    const displayPrice = (ov?.custom_price != null) ? ov.custom_price : p.price;
    const inCart = !!cart[p.id];
    return `<div class="product-card" id="card-${p.id}">
      <div class="product-img" ${p.img_url?`onclick="openPubImg('${p.img_url}')" style="cursor:zoom-in" title="Ver imagen ampliada"`:''}>
        ${p.img_url?`<img src="${p.img_url}" alt="${esc(displayName)}" loading="lazy">`:`<div class="no-img-icon">🖼</div>`}
      </div>
      <div class="product-code">[${p.code}]</div>
      <div class="product-name">${esc(displayName)}</div>
      <div class="product-footer">
        <div class="product-price ${displayPrice===0?'consultar':''}">
          ${displayPrice>0?'$'+displayPrice.toLocaleString('es-AR'):'Consultar precio'}
        </div>
        <div class="product-stock ${p.stock>0?'stock-ok':'stock-zero'}">
          ${p.stock>0?'✔ '+p.stock:'Sin stock'}
        </div>
      </div>
      <button class="btn-add-cart ${inCart?'in-cart':''}" onclick="toggleCartItem(${p.id})" id="addbtn-${p.id}">
        ${inCart?'✔ En el carrito  · Quitar':'🛒 Agregar al carrito'}
      </button>
    </div>`;
  }).join('');
  renderPagination();
}

function renderPagination() {
  const total=Math.ceil(filtered.length/PER_PAGE);
  const pag=document.getElementById('pagination');
  if(total<=1){pag.style.display='none';return;}
  pag.style.display='flex';
  let html=`<button class="page-btn" onclick="renderPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  const pages=[];
  for(let i=1;i<=total;i++){
    if(i===1||i===total||(i>=currentPage-2&&i<=currentPage+2))pages.push(i);
    else if(pages[pages.length-1]!=='…')pages.push('…');
  }
  pages.forEach(p=>{
    if(p==='…')html+=`<span class="page-info">…</span>`;
    else html+=`<button class="page-btn ${p===currentPage?'active':''}" onclick="renderPage(${p})">${p}</button>`;
  });
  html+=`<button class="page-btn" onclick="renderPage(${currentPage+1})" ${currentPage===Math.ceil(filtered.length/PER_PAGE)?'disabled':''}>›</button>`;
  pag.innerHTML=html;
}

// ── CART ──────────────────────────────────────────────────
function toggleCartItem(productId) {
  const product = allProducts.find(p=>p.id===productId);
  if (!product) return;
  if (cart[productId]) delete cart[productId];
  else cart[productId] = { product, qty: 1 };
  saveCartToStorage();
  updateCartBtn(productId);
  updateCartCount();
  renderCartDrawer();
}

function updateCartBtn(productId) {
  const btn = document.getElementById(`addbtn-${productId}`);
  if (!btn) return;
  const inCart = !!cart[productId];
  btn.className = 'btn-add-cart ' + (inCart?'in-cart':'');
  btn.textContent = inCart ? '✔ En el carrito  · Quitar' : '🛒 Agregar al carrito';
}

function updateCartCount() {
  const items = Object.keys(cart);
  const totalQty = items.reduce((s,id)=>s+cart[id].qty, 0);
  const count = document.getElementById('cartCount');
  count.textContent = totalQty;
  count.classList.toggle('visible', totalQty > 0);
  // bounce
  const btn = document.getElementById('cartBtn');
  btn.classList.remove('bounce');
  void btn.offsetWidth;
  btn.classList.add('bounce');
}

function changeQty(productId, delta) {
  if (!cart[productId]) return;
  cart[productId].qty = Math.max(1, cart[productId].qty + delta);
  saveCartToStorage();
  updateCartCount();
  renderCartDrawer();
}

function removeFromCart(productId) {
  delete cart[productId];
  saveCartToStorage();
  updateCartBtn(productId);
  updateCartCount();
  renderCartDrawer();
}

function clearCart() {
  Object.keys(cart).forEach(id => updateCartBtn(parseInt(id)));
  cart = {};
  clearCartStorage();
  updateCartCount();
  renderCartDrawer();
}

function getBestPromo(totalItems) {
  return activePromotions.filter(p=>totalItems>=p.min_cantidad).sort((a,b)=>b.descuento_pct-a.descuento_pct)[0]||null;
}
function getNextPromo(totalItems) {
  return activePromotions.filter(p=>totalItems<p.min_cantidad).sort((a,b)=>a.min_cantidad-b.min_cantidad)[0]||null;
}

function renderCartDrawer() {
  const body   = document.getElementById('cartBody');
  const footer = document.getElementById('cartFooter');
  const items  = Object.values(cart);

  if (!items.length) {
    body.innerHTML=`<div class="cart-empty"><div class="icon">🛒</div><p>Tu carrito está vacío</p><p style="font-size:.78rem">Agregá productos para armar tu pedido</p></div>`;
    footer.style.display='none';
    return;
  }

  footer.style.display='flex';
  const totalItems = items.reduce((s,i)=>s+i.qty, 0);
  let totalKnown=0, hasConsultar=false;
  items.forEach(({product:p,qty})=>{
    const ov = allOverrides[p.code];
    const price = (ov?.custom_price != null) ? ov.custom_price : p.price;
    if (price>0) totalKnown += price*qty;
    else hasConsultar = true;
  });

  // Promociones
  const bestPromo = getBestPromo(totalItems);
  const nextPromo = getNextPromo(totalItems);
  let discountAmt = 0;
  let promoHtml = '';
  if (bestPromo && totalKnown>0) {
    discountAmt = Math.round(totalKnown * bestPromo.descuento_pct / 100);
    promoHtml += `<div style="background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.25);border-radius:8px;padding:.6rem 1rem;font-size:.8rem;color:var(--ok);margin-bottom:.75rem">
      🏷️ <strong>${esc(bestPromo.nombre)}</strong>: ${bestPromo.descuento_pct}% off aplicado (${bestPromo.min_cantidad}+ productos)
    </div>`;
  }
  if (nextPromo) {
    const faltam = nextPromo.min_cantidad - totalItems;
    promoHtml += `<div style="background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);border-radius:8px;padding:.55rem 1rem;font-size:.75rem;color:var(--warn);margin-bottom:.75rem">
      💡 Agregá ${faltam} producto${faltam>1?'s':''} más y obtenés <strong>${nextPromo.descuento_pct}% de descuento</strong>
    </div>`;
  }

  document.getElementById('cartItemCount').textContent = totalItems;
  const totalEl = document.getElementById('cartTotal');
  const finalTotal = totalKnown - discountAmt;
  if (totalKnown>0 && !hasConsultar) {
    let txt = '$'+finalTotal.toLocaleString('es-AR');
    if (discountAmt>0) txt = `<span style="text-decoration:line-through;opacity:.45;font-size:.85em">$${totalKnown.toLocaleString('es-AR')}</span> $${finalTotal.toLocaleString('es-AR')}`;
    totalEl.innerHTML = txt;
    document.getElementById('cartTotalWrap').style.display='flex';
  } else if (totalKnown>0 && hasConsultar) {
    totalEl.textContent = '$'+finalTotal.toLocaleString('es-AR')+' + consultar';
    document.getElementById('cartTotalWrap').style.display='flex';
  } else {
    document.getElementById('cartTotalWrap').style.display='none';
  }

  body.innerHTML = promoHtml + items.map(({product:p, qty})=>{
    const ov = allOverrides[p.code];
    const displayName  = ov?.display_name  || p.name;
    const displayPrice = (ov?.custom_price != null) ? ov.custom_price : p.price;
    return `<div class="cart-item">
      ${p.img_url
        ?`<img class="cart-item-img" src="${p.img_url}" alt="${esc(displayName)}">`
        :`<div class="cart-item-img-placeholder">🖼</div>`}
      <div class="cart-item-info">
        <div class="cart-item-code">[${p.code}]</div>
        <div class="cart-item-name">${esc(displayName)}</div>
        <div class="cart-item-price ${displayPrice===0?'consultar':''}">
          ${displayPrice>0?'$'+displayPrice.toLocaleString('es-AR'):'Consultar precio'}
        </div>
        <div class="cart-item-qty">
          <button class="qty-btn" onclick="changeQty(${p.id},-1)">−</button>
          <span class="qty-num">${qty}</span>
          <button class="qty-btn" onclick="changeQty(${p.id},1)">+</button>
        </div>
      </div>
      <button class="cart-item-remove" onclick="removeFromCart(${p.id})" title="Quitar">✕</button>
    </div>`;
  }).join('');
}

function toggleCart() {
  const overlay = document.getElementById('cartOverlay');
  const drawer = document.getElementById('cartDrawer');
  overlay.classList.toggle('open');
  drawer.classList.toggle('open');
}

// ── WHATSAPP ─────────────────────────────────────────────
function getSelectedStore() {
  const checked = document.querySelector('input[name="storeSelect"]:checked');
  return WA_STORES[checked?.value || Object.keys(WA_STORES)[0]];
}
function sendToWhatsapp() {
  const items = Object.values(cart);
  if (!items.length) return;
  const store = getSelectedStore();
  const nota = document.getElementById('cartNote').value.trim();
  let msg = '🛒 *PEDIDO DTZ SERVICIO TÉCNICO*\n';
  msg += `📍 *Retiro en:* ${store.nombre}\n`;
  msg += '━━━━━━━━━━━━━━━━━━━━\n';
  items.forEach(({product:p, qty}, i) => {
    const ov = allOverrides[p.code];
    const displayName  = ov?.display_name  || p.name;
    const displayPrice = (ov?.custom_price != null) ? ov.custom_price : p.price;
    msg += `\n*${i+1}. ${displayName}*\n`;
    msg += `   Código: [${p.code}]\n`;
    msg += `   Cantidad: ${qty}\n`;
    msg += `   Precio unitario: ${displayPrice>0 ? '$'+displayPrice.toLocaleString('es-AR') : 'A consultar'}\n`;
  });

  msg += '\n━━━━━━━━━━━━━━━━━━━━\n';

  const totalItems = items.reduce((s,i)=>s+i.qty,0);
  let totalKnown=0, hasConsultar=false;
  items.forEach(({product:p,qty})=>{
    const ov = allOverrides[p.code];
    const price = (ov?.custom_price != null) ? ov.custom_price : p.price;
    if(price>0) totalKnown+=price*qty; else hasConsultar=true;
  });
  const bestPromo = getBestPromo(totalItems);
  const discountAmt = (bestPromo && totalKnown>0) ? Math.round(totalKnown * bestPromo.descuento_pct/100) : 0;
  if (totalKnown>0) msg += `*Subtotal: $${totalKnown.toLocaleString('es-AR')}*\n`;
  if (discountAmt>0) msg += `*Descuento ${bestPromo.descuento_pct}% (${bestPromo.nombre}): -$${discountAmt.toLocaleString('es-AR')}*\n*Total: $${(totalKnown-discountAmt).toLocaleString('es-AR')}*\n`;
  if (hasConsultar) msg += `_Algunos productos requieren consulta de precio_\n`;

  if (nota) msg += `\n📝 *Nota:* ${nota}\n`;
  msg += '\n_Enviado desde el catálogo web de DTZ_';

  window.open(`https://wa.me/${store.numero}?text=${encodeURIComponent(msg)}`, '_blank');
}

function openPubImg(url) {
  const modal = document.getElementById('pubImgModal');
  document.getElementById('pubImgContent').src = url;
  modal.style.display = 'flex';
  setTimeout(() => modal.classList.add('open'), 10);
}
function closePubImg() {
  const modal = document.getElementById('pubImgModal');
  modal.classList.remove('open');
  setTimeout(() => { modal.style.display = 'none'; document.getElementById('pubImgContent').src = ''; }, 200);
}

// ── UTILS ──────────────────────────────────────────────
function esc(str){return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

document.getElementById('searchInput').addEventListener('input',()=>{currentPage=1;applyFiltersAndRender();});

async function loadContactBar() {
  const bar = document.getElementById('contactBar');
  if (!bar) return;
  try {
    const {data} = await db.from('contact_items')
      .select('*').eq('activo', true).order('orden', {ascending: true});
    if (!data?.length) return;
    bar.innerHTML = data.map(item => {
      const inner = `${item.icono} ${item.texto}`;
      return item.link_url
        ? `<a href="${item.link_url}" target="_blank" rel="noopener">${inner}</a>`
        : `<span>${inner}</span>`;
    }).join('');
  } catch(e) {}
}

loadLogo();
loadBanners();
loadContactBar();
loadProducts().then(() => loadCartFromStorage());
